builds:
  - binary: trunkit
    goos:
      - darwin
      - linux
    goarch:
      - amd64
      - arm64
    env:
      - CGO_ENABLED=0
    flags:
      - -mod=vendor

release:
  prerelease: auto

universal_binaries:
  - replace: true

brews:
  -
    name: trunkit
    homepage: https://github.com/ChisTrun/trunkit
    tap:
      owner: trunkit
      name: homebrew-trunkit
    commit_author:
      name: ChisTrun
      email: vochitrung.pst@gmail.com

checksum:
  name_template: 'checksums.txt'